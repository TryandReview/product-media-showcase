<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Feed</title>
    <style>
        :root {
            --bg:          #f8f9fa;
            --surface:     #ffffff;
            --surface-hov: #f8f9fa;
            --border:      #dee2e6;
            --accent-a:    #007bff;
            --accent-b:    #0056b3;
            --text:        #212529;
            --muted:       #6c757d;
            --nav-bg:      #cceee6;
            --ig-a:        #f58529;
            --ig-b:        #dd2a7b;
            --ig-c:        #8134af;
            --tt-a:        #fe2c55;
            --fb:          #1877f2;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
        }

        /* ── Header ── */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--nav-bg);
            border-bottom: 1px solid rgba(0,0,0,.08);
            padding: .75rem 2rem;
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }

        .logo {
            flex-shrink: 0;
            display: flex;
            align-items: center;
        }
        .logo img { display: block; }

        .filters {
            display: flex;
            gap: .375rem;
            flex-wrap: wrap;
            flex: 1;
        }

        .filter-btn {
            padding: .3rem .8rem;
            border-radius: .25rem;
            border: 1px solid rgba(0,0,0,.15);
            background: transparent;
            color: rgba(0,0,0,.5);
            cursor: pointer;
            font-size: .8rem;
            font-weight: 400;
            transition: all .15s ease;
            line-height: 1.5;
        }
        .filter-btn:hover {
            background: rgba(0,0,0,.07);
            color: #2b00d6;
            border-color: rgba(0,0,0,.25);
        }

        .filter-btn.active[data-platform="all"] {
            background: #2b00d6;
            border-color: #2b00d6;
            color: #fff;
        }
        .filter-btn.active[data-platform="instagram"] {
            background: linear-gradient(120deg, var(--ig-a), var(--ig-b), var(--ig-c));
            border-color: transparent; color: #fff;
        }
        .filter-btn.active[data-platform="tiktok"] {
            background: #010101; border-color: var(--tt-a); color: #fff;
        }
        .filter-btn.active[data-platform="facebook"] {
            background: var(--fb); border-color: transparent; color: #fff;
        }

        .post-count {
            font-size: .8rem;
            color: rgba(0,0,0,.4);
            flex-shrink: 0;
            min-width: 4rem;
            text-align: right;
        }

        /* ── Layout ── */
        main {
            padding: 2rem;
            max-width: 1440px;
            margin: 0 auto;
        }

        #feed {
            columns: 3;
            column-gap: 1.25rem;
        }
        @media (max-width: 1080px) { #feed { columns: 2; } }
        @media (max-width: 600px)  {
            #feed  { columns: 1; }
            main   { padding: 1rem; }
            header { padding: .625rem 1rem; }
        }

        /* ── Card ── */
        .card {
            break-inside: avoid;
            margin-bottom: 1.25rem;
            border-radius: .25rem;
            background: var(--surface);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: box-shadow .2s ease;
        }
        .card:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,.12);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: .5rem;
            padding: .5rem .75rem;
            background: var(--surface-hov);
            border-bottom: 1px solid var(--border);
        }

        .platform-badge {
            display: inline-flex;
            align-items: center;
            gap: .3rem;
            padding: .2rem .6rem;
            border-radius: .2rem;
            font-size: .65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .07em;
        }
        .platform-badge.instagram { background: linear-gradient(120deg, var(--ig-a), var(--ig-b)); color: #fff; }
        .platform-badge.tiktok    { background: #010101; color: #fff; border: 1px solid var(--tt-a); }
        .platform-badge.facebook  { background: var(--fb); color: #fff; }
        .platform-badge.unknown   { background: #e9ecef; color: var(--muted); }

        .badge-dot {
            width: 6px; height: 6px;
            border-radius: 50%; flex-shrink: 0;
        }
        .instagram .badge-dot { background: #fff; }
        .tiktok    .badge-dot { background: var(--tt-a); }
        .facebook  .badge-dot { background: #fff; }
        .unknown   .badge-dot { background: var(--muted); }

        .card-body {
            padding: .75rem;
            display: flex;
            justify-content: center;
        }
        .card-body blockquote,
        .card-body .fb-post,
        .card-body iframe {
            display: block;
            max-width: 100%;
            margin: 0 auto;
        }
        /* Lazy placeholder shown until a card scrolls near the viewport. */
        .card-body.placeholder { align-items: center; }

        .link-card {
            display: block;
            padding: .75rem;
            font-size: .8rem;
            color: var(--muted);
            text-decoration: none;
            word-break: break-all;
            border-radius: .25rem;
            background: #f8f9fa;
            border: 1px solid var(--border);
            transition: color .15s;
        }
        .link-card:hover { color: var(--accent-a); }

        /* ── States ── */
        .state-box {
            text-align: center;
            padding: 5rem 2rem;
        }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--accent-a);
            border-radius: 50%;
            animation: spin .75s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .state-box h2  { font-size: 1.1rem; margin-bottom: .4rem; color: var(--text); }
        .state-box p   { font-size: .85rem; color: var(--muted); line-height: 1.7; }
        .state-box code {
            background: #e9ecef;
            color: #495057;
            padding: .1rem .4rem;
            border-radius: .2rem;
            font-size: .8rem;
        }
        .state-box.error h2 { color: #dc3545; }
    </style>
</head>
<body>
    <header>
        <div class="logo"><img src="logo.png" alt="Try&Review" height="32"></div>
        <div class="filters">
            <button class="filter-btn active" data-platform="all">All</button>
            <button class="filter-btn" data-platform="instagram">Instagram</button>
            <button class="filter-btn" data-platform="tiktok">TikTok</button>
            <button class="filter-btn" data-platform="facebook">Facebook</button>
        </div>
        <div class="post-count" id="post-count"></div>
    </header>

    <main>
        <div id="loading" class="state-box">
            <div class="spinner"></div>
            <p>Loading feed&hellip;</p>
        </div>
        <div id="feed" style="display:none;"></div>
    </main>

    <script>
        // ── Data source resolution ────────────────────────────────────────────
        //
        //  ?sheet=SPREADSHEET_ID          Google Sheets (recommended — CORS-safe)
        //  ?sheet=ID&tab=Sheet2           specific tab
        //  ?drive=FILE_ID                 Google Drive CSV file
        //  ?src=https://example.com/a.csv any public CSV URL
        //  (no params)                    local posts.csv fallback
        //
        function getDataUrl() {
            const p = new URLSearchParams(location.search);

            if (p.has('sheet')) {
                const tab = p.get('tab') || '';
                const base = `https://docs.google.com/spreadsheets/d/${p.get('sheet')}/gviz/tq?tqx=out:csv`;
                return tab ? `${base}&sheet=${encodeURIComponent(tab)}` : base;
            }
            if (p.has('drive')) {
                return `https://drive.google.com/uc?export=download&id=${p.get('drive')}`;
            }
            if (p.has('src')) {
                return p.get('src');
            }
            return 'posts.csv';
        }

        // ── Platform detection ────────────────────────────────────────────────
        function detectPlatform(url) {
            if (/instagram\.com/.test(url))                    return 'instagram';
            if (/tiktok\.com/.test(url))                       return 'tiktok';
            if (/facebook\.com|fb\.com|fb\.watch/.test(url))  return 'facebook';
            return 'unknown';
        }

        // ── CSV parser ────────────────────────────────────────────────────────
        function parseCSV(text) {
            const lines = text.trim().split(/\r?\n/);
            const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
            return lines.slice(1).map(line => {
                const vals = line.split(',').map(v => v.trim().replace(/^"|"$/g, ''));
                const obj = {};
                headers.forEach((h, i) => { obj[h] = vals[i]; });
                return obj;
            });
        }

        // ── Feed state ────────────────────────────────────────────────────────
        const LABELS = { instagram: 'Instagram', tiktok: 'TikTok', facebook: 'Facebook', unknown: 'Link' };
        let allPosts = [];

        // ── Embed HTML ────────────────────────────────────────────────────────
        function embedHTML(post) {
            const u = post.url;
            switch (post.platform) {
                case 'instagram': {
                    const m = u.match(/instagram\.com\/(p|reel|tv)\/([A-Za-z0-9_-]+)/);
                    if (!m) return fallbackLink(u);
                    const src = `https://www.instagram.com/${m[1]}/${m[2]}/embed/captioned/`;
                    return `<iframe src="${src}" width="400" height="560" loading="lazy"
                        frameborder="0" scrolling="no" allowtransparency="true"
                        style="display:block;max-width:100%;border:0;border-radius:3px;"></iframe>`;
                }
                case 'tiktok': {
                    const id = (u.match(/\/video\/(\d+)/) || [])[1] || '';
                    if (!id) return fallbackLink(u);
                    const src = `https://www.tiktok.com/player/v1/${id}?description=1&music_info=1`;
                    return `<iframe src="${src}" width="325" height="575" loading="lazy"
                        frameborder="0" scrolling="no"
                        allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
                        style="display:block;max-width:100%;border:0;border-radius:3px;"></iframe>`;
                }
                case 'facebook': {
                    const isVideo = /\/videos?\/|watch\?.*v=|\/video\//i.test(u);
                    const plugin  = isVideo ? 'video' : 'post';
                    const src     = `https://www.facebook.com/plugins/${plugin}.php` +
                                    `?href=${encodeURIComponent(u)}&width=500&show_text=true&height=500`;
                    return `<iframe src="${src}" width="500" height="500" loading="lazy"
                        style="display:block;max-width:100%;border:none;overflow:hidden;"
                        scrolling="no" frameborder="0" allowfullscreen="true"
                        allow="autoplay;clipboard-write;encrypted-media;picture-in-picture;web-share">
                    </iframe>`;
                }
                default:
                    return fallbackLink(u);
            }
        }

        function fallbackLink(u) {
            return `<a class="link-card" href="${u}" target="_blank" rel="noopener noreferrer">${u}</a>`;
        }

        // Approx card heights per platform — keeps the masonry from jumping while
        // the real embed is still a placeholder.
        const PLACEHOLDER_HEIGHTS = { instagram: 560, tiktok: 575, facebook: 500, unknown: 64 };

        function makeCard(post) {
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.platform = post.platform;
            card.dataset.url = post.url;
            const h = PLACEHOLDER_HEIGHTS[post.platform] ?? 480;
            card.innerHTML = `
                <div class="card-header">
                    <span class="platform-badge ${post.platform}">
                        <span class="badge-dot"></span>${LABELS[post.platform] ?? 'Link'}
                    </span>
                </div>
                <div class="card-body placeholder" style="min-height:${h}px;">
                    <div class="spinner"></div>
                </div>`;
            return card;
        }

        // ── Lazy embed hydration ──────────────────────────────────────────────
        // Cards render instantly as placeholders; the real embed (a plain iframe
        // for all platforms) is injected only when the card scrolls near the
        // viewport. This avoids firing every Instagram/TikTok/Facebook iframe at
        // once, which the browser serialises behind its per-host connection cap.

        function hydrateCard(card) {
            if (card.dataset.hydrated) return;
            card.dataset.hydrated = '1';
            const post = { url: card.dataset.url, platform: card.dataset.platform };
            const body = card.querySelector('.card-body');
            body.classList.remove('placeholder');
            body.style.minHeight = '';
            body.innerHTML = embedHTML(post);
        }

        // rootMargin preloads cards ~1.5 viewports ahead so embeds are usually
        // ready by the time they're scrolled into view.
        const cardObserver = ('IntersectionObserver' in window)
            ? new IntersectionObserver((entries, obs) => {
                entries.forEach(e => {
                    if (e.isIntersecting) { hydrateCard(e.target); obs.unobserve(e.target); }
                });
              }, { rootMargin: '1200px 0px' })
            : null;

        // ── Render ────────────────────────────────────────────────────────────
        function renderPosts(posts) {
            const feed = document.getElementById('feed');
            if (cardObserver) cardObserver.disconnect();   // stop watching old cards
            feed.innerHTML = '';
            if (posts.length === 0) {
                feed.innerHTML = `<div class="state-box">
                    <h2>No posts found</h2>
                    <p>Try a different filter or check the data source.</p></div>`;
                return;
            }
            posts.forEach(p => {
                const card = makeCard(p);
                feed.appendChild(card);
                if (cardObserver) cardObserver.observe(card);
                else hydrateCard(card);                     // no IO support → load all
            });
        }

        function applyFilter(platform) {
            document.querySelectorAll('.filter-btn').forEach(btn =>
                btn.classList.toggle('active', btn.dataset.platform === platform)
            );
            const filtered = platform === 'all' ? allPosts : allPosts.filter(p => p.platform === platform);
            document.getElementById('post-count').textContent =
                filtered.length === 1 ? '1 post' : `${filtered.length} posts`;
            renderPosts(filtered);
        }

        document.querySelectorAll('.filter-btn').forEach(btn =>
            btn.addEventListener('click', () => applyFilter(btn.dataset.platform))
        );

        // ── Load ──────────────────────────────────────────────────────────────
        async function loadFeed() {
            const url = getDataUrl();
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const rows = parseCSV(await res.text());
                const urlKey = Object.keys(rows[0] ?? {}).find(k => k.toLowerCase() === 'url')
                            ?? Object.keys(rows[0] ?? {})[0];
                allPosts = rows
                    .map(r => (r[urlKey] ?? '').trim())
                    .filter(Boolean)
                    .map(u => ({ url: u, platform: detectPlatform(u) }));

                document.getElementById('loading').style.display = 'none';
                document.getElementById('feed').style.display = '';
                applyFilter('all');
            } catch {
                document.getElementById('loading').innerHTML = `
                    <div class="state-box error">
                        <h2>Could not load posts</h2>
                        <p>
                            Add a data source to the URL:<br><br>
                            <code>?sheet=SPREADSHEET_ID</code> &nbsp;— Google Sheets (recommended)<br>
                            <code>?drive=FILE_ID</code> &nbsp;— Google Drive CSV<br>
                            <code>?src=https://…/posts.csv</code> &nbsp;— any public CSV<br><br>

                        </p>
                    </div>`;
            }
        }

        loadFeed();
    </script>
</body>
</html>
